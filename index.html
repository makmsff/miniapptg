<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>Тест связи</h1>
    <button onclick="testSend()">Отправить тест</button>

<script>
    let tg = window.Telegram.WebApp;
    tg.ready();

    tg.MainButton.setText("Проверить связь");
    tg.MainButton.show();

    tg.MainButton.onClick(() => {
        // Добавим алерт, чтобы проверить, работает ли вообще JavaScript
        alert("Кнопка нажата! Пытаюсь отправить...");
        
        try {
            tg.sendData("ТЕСТ_СВЯЗИ_ПРОШЕЛ");
            alert("Команда sendData отправлена!");
        } catch (e) {
            alert("Ошибка: " + e.message);
        }
    });
</script>
</body>
</html>
