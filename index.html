<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>Тест связи</h1>
    <button onclick="testSend()">Отправить тест</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();

        function testSend() {
            tg.sendData("ТЕСТ СВЯЗИ РАБОТАЕТ");
            alert("Данные отправлены!"); 
        }
    </script>
</body>
</html>
