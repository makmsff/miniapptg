<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>Тест связи</h1>
    <button onclick="testSend()">Отправить тест</button>
<script>
    let tg = window.Telegram.WebApp;
    tg.ready();

    // Создаем кнопку, которая ТОЧНО шлет данные
    tg.MainButton.text = "Получить предсказание";
    tg.MainButton.show();

    tg.MainButton.onClick(() => {
        // Пробуем отправить просто строку
        tg.sendData("Удача близко!");
        
        // Закрываем приложение, чтобы проверить, придет ли сигнал
        tg.close();
    });
</script>
</body>
</html>
