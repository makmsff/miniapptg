<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>Тест связи</h1>
    <button onclick="testSend()">Отправить тест</button>
<script>
    let tg = window.Telegram.WebApp;
    tg.ready();

    // Добавляем обработчик на MainButton
    tg.MainButton.setText("Отправить данные");
    tg.MainButton.show();

    tg.MainButton.onClick(() => {
        // Выводим информацию о боте, который открыл приложение
        alert("Бот ID: " + tg.initDataUnsafe.chat?.id); 
        
        // Попытка отправить данные
        tg.sendData("ПРОВЕРКА_СВЯЗИ_123");
    });
</script>
</body>
</html>
