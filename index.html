<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); padding: 20px; }
        h1 { font-size: 20px; }
        .card { background: var(--tg-theme-secondary-bg-color); padding: 15px; border-radius: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🔮 Магический Шар</h1>
    <div class="card" id="user-info">Загрузка...</div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();

        // Показываем имя пользователя
        const user = tg.initDataUnsafe.user;
        document.getElementById("user-info").innerText = "Привет, " + (user ? user.first_name : "Гость") + "! Готов узнать будущее?";

        // Настраиваем кнопку
        tg.MainButton.text = "Получить предсказание";
        tg.MainButton.show();

        const predictions = [
            "Сегодня отличный день для кода!",
            "Тебя ждет успех в Mini Apps",
            "Бот ответит тебе взаимностью",
            "Удача на твоей стороне",
            "Пора выпить кофе и продолжить"
        ];

        tg.MainButton.onClick(() => {
            const random = predictions[Math.floor(Math.random() * predictions.length)];
            // Отправляем результат в чат
            tg.sendData("🔮 Предсказание для тебя: " + random);
        });
    </script>
</body>
</html>
